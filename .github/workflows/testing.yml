name: testing

on:
  push:

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install Bevy Linux dependencies (Wayland/X11)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            libgl1-mesa-dev
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Run tests for game-testing crate
        run: cargo test -p game-testing --locked
      - name: Track code coverage for game-testing
        run: cargo llvm-cov --package game-testing --lcov --output-path ./coverage.lcov --ignore-filename-regex '(^|/)apps/'
      - name: Validate coverage report
        run: |
          test -s coverage.lcov
          grep -q '^SF:' coverage.lcov
          grep -q '^SF:.*crates/' coverage.lcov
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-testing-coverage
          path: coverage.lcov

  coverage:
    needs: testing
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
