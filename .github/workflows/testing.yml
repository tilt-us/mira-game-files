name: testing

on:
  push:

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Bevy Linux dependencies (Wayland/X11)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            libgl1-mesa-dev
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Run tests for game-testing crate
        run: cargo test -p game-testing --locked
