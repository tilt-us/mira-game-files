<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="debug_screen">
    <title>Title</title>
    <link rel="stylesheet" href="css/debug.css">
</head>
<body>
<div class="debug-container">
    <h5>System Info</h5>
    <div class="debug-row">
        <p class="debug-label">FPS per sec:</p>
        <p id="debug-fps-value">-</p>
    </div>
    <div class="debug-row">
        <p class="debug-label">CPU Name:</p>
        <p id="debug-cpu-name-value">-</p>
    </div>
    <div class="debug-row">
        <p class="debug-label">CPU Last (App/System):</p>
        <p id="debug-cpu-load-value">-</p>
    </div>
    <div class="debug-row">
        <p class="debug-label">GPU Name:</p>
        <p id="debug-gpu-name-value">-</p>
    </div>
    <div class="debug-row">
        <p class="debug-label">GPU VRAM:</p>
        <p id="debug-gpu-vram-value">-</p>
    </div>
    <div class="debug-row">
        <p class="debug-label">GPU Last:</p>
        <p id="debug-gpu-load-value">-</p>
    </div>
</div>
</body>
</html>
