codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 0%
        if_not_found: failure
        if_ci_failed: error
        informational: false
    patch:
      default:
        target: 80%
        threshold: 0%
        if_not_found: failure
        if_ci_failed: error
        informational: false
